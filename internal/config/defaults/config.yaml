# Default cortex config (bootstrapped on first run if absent).
# Shell, file write/edit, and git tools are always enabled at runtime;
# deny_list in settings.json is the security boundary.
defaultModel: anthropic/claude-sonnet-4.5
models:
    anthropic:
        provider: anthropic
        model: claude-sonnet-4.5
tools:
    allowShell: true
    allowWrite: true
    allowGit: true
streaming: true
showUsage: true
autoCompact: true
