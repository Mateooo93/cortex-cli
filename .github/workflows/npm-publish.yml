name: Publish npm package

# Publishes @mateooo93/cortex to GitHub Packages (npm.pkg.github.com).
# Uses the workflow GITHUB_TOKEN — no NPM_TOKEN or npm 2FA required.
# Make the package public after first publish:
#   Repo → Packages → @mateooo93/cortex → Package settings → Change visibility

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Version to publish (e.g. v0.25.18)"
        required: true
        default: "v0.25.18"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish @mateooo93/cortex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: https://npm.pkg.github.com
          scope: "@mateooo93"

      - name: Verify GitHub Packages auth
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "npm user: $(npm whoami --registry https://npm.pkg.github.com)"

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./script/publish-npm.sh "${{ inputs.release-tag }}" --yes --registry github