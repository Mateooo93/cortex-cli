name: Publish npm package

# Publishes mateooo93-cortex to the npm registry.
# Requires repo secret NPM_TOKEN (npm automation token from npmjs.com).

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "Version to publish (e.g. v0.25.18)"
        required: true
        default: "v0.25.18"

permissions:
  contents: read

jobs:
  publish:
    name: Publish mateooo93-cortex
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish
        run: ./script/publish-npm.sh "${{ inputs.release-tag }}" --yes