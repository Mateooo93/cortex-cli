name: Submit winget manifest

# Opens a PR to microsoft/winget-pkgs so `winget install Mateooo93.Cortex` works.
# Requires repo secret WINGET_TOKEN (GitHub PAT with public_repo; fork winget-pkgs first).
#
# Run manually after a release is published, or rely on the release workflow step.

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: "GitHub release tag (e.g. v0.25.18)"
        required: true
        default: "v0.25.18"

permissions:
  contents: read

jobs:
  submit:
    name: Open winget-pkgs PR
    runs-on: ubuntu-latest
    steps:
      - name: Check WINGET_TOKEN
        id: token
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -z "${WINGET_TOKEN:-}" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::error::WINGET_TOKEN secret is not set."
            echo "Create a GitHub PAT, fork https://github.com/microsoft/winget-pkgs,"
            echo "add WINGET_TOKEN to repo secrets, then re-run this workflow."
            exit 1
          fi
          echo "present=true" >> "$GITHUB_OUTPUT"

      - name: Submit manifest PR
        if: steps.token.outputs.present == 'true'
        uses: vedantmgoyal2009/winget-releaser@main
        with:
          identifier: Mateooo93.Cortex
          release-tag: ${{ inputs.release-tag }}
          installers-regex: 'cortex-windows-.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}