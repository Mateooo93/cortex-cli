name: Auto-Fix Issues

on:
  issues:
    types: [opened, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: string
  pull_request_review:
    types: [submitted]
  schedule:
    - cron: '* * * * *'  # Every minute

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  # Use OpenCode Zen with free models
  OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
  CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
  # For opencode delegation
  OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}

jobs:
  # Single setup job that caches opencode
  setup:
    runs-on: ubuntu-latest
    outputs:
      opencode-path: ${{ steps.cache-opencode.outputs.opencode-path }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build cortex binary
        run: make build

      - name: Cache opencode
        id: cache-opencode
        uses: actions/cache@v4
        with:
          path: ~/.opencode
          key: opencode-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            opencode-${{ runner.os }}-

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Install opencode (if not cached)
        if: steps.cache-opencode.outputs.cache-hit != 'true'
        run: |
          curl -fsSL https://opencode.ai/install | bash

      - name: Verify opencode
        run: opencode --version

  # Main fix job - runs on issue events or workflow_dispatch
  detect-and-fix:
    needs: setup
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'auto-fix') || github.event_name == 'workflow_dispatch'
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
      issue_number: ${{ steps.get-issue.outputs.issue_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore opencode from cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode
          key: opencode-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            opencode-${{ runner.os }}-

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Get issue number
        id: get-issue
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "issue_number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
          else
            echo "issue_number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Run opencode to fix issue
        id: fix-issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          # Don't pass OPENCODE_API_KEY - let opencode use GITHUB_TOKEN for GitHub ops
        run: |
          ISSUE_NUM=${{ steps.get-issue.outputs.issue_number }}
          opencode run "Fix issue #$ISSUE_NUM. Read the issue, understand the problem, implement the fix, and create a PR with the changes. Use model nvidia/nemotron-3-ultra-free or minimax/m3 via OpenCode Zen."

      - name: Find created PR
        id: create-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=${{ steps.get-issue.outputs.issue_number }}
          PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --search "fixes #$ISSUE_NUM" --json number --jq '.[0].number')
          if [[ -n "$PR_NUMBER" && "$PR_NUMBER" != "null" ]]; then
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            PR_NUMBER=$(gh pr list --repo ${{ github.repository }} --state open --json number,title --jq '.[] | select(.title | test("auto-fix|Fix.*#'$ISSUE_NUM'"; "i")) | .number' | head -1)
            if [[ -n "$PR_NUMBER" ]]; then
              echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
            fi
          fi

  # Validate PR after fix
  validate-pr:
    needs: detect-and-fix
    runs-on: ubuntu-latest
    if: always() && needs.detect-and-fix.outputs.pr_number != ''
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Run tests
        run: make test

      - name: Build release
        run: make release VERSION=test

  # Handle CodeRabbit reviews
  handle-coderabbit-review:
    needs: detect-and-fix
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_review' && github.event.review.user.login == 'coderabbitai' && needs.detect-and-fix.outputs.pr_number != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore opencode from cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode
          key: opencode-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            opencode-${{ runner.os }}-

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Fetch CodeRabbit review comments
        id: fetch-review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ needs.detect-and-fix.outputs.pr_number }}
          REVIEW_BODY=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --jq '.[] | select(.user.login=="coderabbitai") | .body' | tail -1)
          REVIEW_COMMENTS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments --jq '.[] | select(.user.login=="coderabbitai") | .body')
          FULL_REVIEW="${REVIEW_BODY}\n\n--- Inline Comments ---\n${REVIEW_COMMENTS}"
          echo "$FULL_REVIEW" > coderabbit_review.txt
          echo "review_body<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_REVIEW" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send CodeRabbit feedback to opencode agent for fixes
        id: fix-from-review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER=${{ needs.detect-and-fix.outputs.pr_number }}
          ISSUE_NUM=${{ needs.detect-and-fix.outputs.issue_number }}
          # Send to opencode with the review context to fix the issues
          opencode run "
          PR #$PR_NUMBER (for issue #$ISSUE_NUM) received a CodeRabbit review with the following feedback:

          $REVIEW

          Please address all CodeRabbit review comments. Make the necessary changes and push to the same PR branch.
          Use model nvidia/nemotron-3-ultra-free or minimax/m3 via OpenCode Zen.
          "

  # Monitor for new CodeRabbit reviews on existing PRs (scheduled - runs every minute)
  monitor-coderabbit:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore opencode from cache
        uses: actions/cache@v4
        with:
          path: ~/.opencode
          key: opencode-${{ runner.os }}-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            opencode-${{ runner.os }}-

      - name: Add opencode to PATH
        run: echo "$HOME/.opencode/bin" >> $GITHUB_PATH

      - name: Find PRs with CodeRabbit reviews needing action
        id: find-prs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRS=$(gh pr list --repo ${{ github.repository }} --state open --json number,title,reviews --jq '.[] | select(.reviews[]?.user.login=="coderabbitai" and .reviews[]?.state=="CHANGES_REQUESTED") | .number')
          echo "prs=$PRS" >> $GITHUB_OUTPUT

      - name: Process each PR with CodeRabbit changes requested
        if: steps.find-prs.outputs.prs != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CORTEX_API_KEY: ${{ secrets.CORTEX_API_KEY }}
          OPENCODE_ZEN_API_KEY: ${{ secrets.OPENCODE_ZEN_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for PR_NUMBER in ${{ steps.find-prs.outputs.prs }}; do
            echo "Processing PR #$PR_NUMBER"
            ISSUE_NUM=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json body --jq '.body' | grep -oP '(?<=Fixes #)\d+' | head -1)
            REVIEW_BODY=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/reviews --jq '.[] | select(.user.login=="coderabbitai" and .state=="CHANGES_REQUESTED") | .body' | tail -1)
            REVIEW_COMMENTS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments --jq '.[] | select(.user.login=="coderabbitai") | .body')
            FULL_REVIEW="${REVIEW_BODY}\n\n--- Inline Comments ---\n${REVIEW_COMMENTS}"
            opencode run "
            PR #$PR_NUMBER (for issue #$ISSUE_NUM) received a CodeRabbit review with the following feedback:

            $FULL_REVIEW

            Please address all CodeRabbit review comments. Make the necessary changes and push to the same PR branch.
            Use model nvidia/nemotron-3-ultra-free or minimax/m3 via OpenCode Zen.
            "
          done

  # Cron to monitor issues every minute
  monitor-issues:
    needs: setup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Find new auto-fix issues
        id: find-issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUES=$(gh issue list --repo ${{ github.repository }} --label auto-fix --state open --json number,title --jq '.[] | select(.title | test("auto-fix"; "i")) | .number')
          echo "issues=$ISSUES" >> $GITHUB_OUTPUT

      - name: Trigger workflow for each new issue
        if: steps.find-issues.outputs.issues != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for ISSUE_NUM in ${{ steps.find-issues.outputs.issues }}; do
            PR_EXISTS=$(gh pr list --repo ${{ github.repository }} --search "fixes #$ISSUE_NUM" --json number --jq '.[0].number')
            if [[ -z "$PR_EXISTS" || "$PR_EXISTS" == "null" ]]; then
              echo "Triggering auto-fix for issue #$ISSUE_NUM"
              gh workflow run auto-fix.yml --repo ${{ github.repository }} -f issue_number=$ISSUE_NUM
            else
              echo "Issue #$ISSUE_NUM already has PR #$PR_EXISTS, skipping"
            fi
          done