name: Release

# Auto-release on merge to main (only when CLI code changes).
# Version is derived from the highest v0.25+ tag (patch bump). Legacy v0.2.x
# and mistaken v0.233.* issue-number tags are ignored.
# Triggers:
#   - push to main (filtered to CLI source: *.go, go.mod, Makefile, scripts, etc.)
#   - manual dispatch (with optional version override)
#
# Requires these repo secrets:
#   GITHUB_TOKEN        (auto-provided)
#   HOMEBREW_TAP_TOKEN  (PAT with 'repo' scope on the homebrew-cortex tap repo)
#   NPM_TOKEN           (npm automation token for mateooo93-cortex publish)
#   WINGET_TOKEN        (PAT for opening PRs to microsoft/winget-pkgs)

on:
  push:
    branches: [main]
    # Only rebuild on changes that actually affect the CLI binary.
    # This avoids unnecessary releases when only docs, README, assets,
    # or other non-code files are touched.
    paths:
      - '**/*.go'
      - 'go.mod'
      - 'go.sum'
      - 'Makefile'
      - 'script/**'
      - '.github/workflows/release.yml'
      - 'packaging/npm/**'
      - 'packaging/winget/**'
      - 'script/publish-npm.sh'
      - 'script/publish-winget.sh'
  workflow_dispatch:
    inputs:
      version:
        description: "Override version (e.g. v0.25.2). Must be > v0.25.0. Leave empty to auto-derive."
        required: false
        default: ""

# Concurrency control: cancel any in-progress release
# when a new push to main arrives. Without this, the
# workflow would run twice (once for the merge commit,
# once for a follow-up commit on the same PR), and the
# second run would race the first. The user noticed
# "2 github action workflows running" — this is the fix.
concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Validate version policy
        run: ./script/derive-version_test.sh

      - name: Derive version
        id: version
        run: |
          set -euo pipefail
          MIN_VERSION="v0.25.0"
          LEGACY_PREFIX="v0.233"

          validate_version() {
            local ver="$1"
            if ! [[ "$ver" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "!! Invalid version: $ver (must be vX.Y.Z)"
              exit 1
            fi
            if [[ "$ver" == "${LEGACY_PREFIX}"* ]]; then
              echo "!! Refusing legacy tag line: $ver"
              exit 1
            fi
            if [[ "$(printf '%s\n' "$MIN_VERSION" "$ver" | sort -V | tail -1)" != "$ver" ]] || [[ "$ver" == "$MIN_VERSION" ]]; then
              echo "!! Version must be newer than $MIN_VERSION, got $ver"
              exit 1
            fi
          }

          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "Using manually supplied version: $VERSION"
          else
            VERSION="$(./script/derive-version.sh)"
            echo "Derived version: $VERSION"
          fi

          validate_version "$VERSION"

          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists; skipping release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Detect optional publish tokens
        id: opt
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          echo "homebrew=$([ -n "$HOMEBREW_TAP_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "npm=$([ -n "$NPM_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "winget=$([ -n "$WINGET_TOKEN" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Skip if already released
        if: steps.version.outputs.skip == 'true'
        run: |
          echo "Nothing to do — release already exists."
          exit 0

      - name: Build
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "==> Building $VERSION"
          make build-web
          ./script/build.sh --version "$VERSION" --force

      - name: Publish release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          # gh CLI requires GH_TOKEN (not GITHUB_TOKEN
          # which is the actions/runner's built-in
          # environment variable for checkout, but not
          # for the gh CLI itself). Without this set
          # explicitly, 'gh release create' fails with:
          #   gh: To use GitHub CLI in a GitHub Actions
          #       workflow, set the GH_TOKEN environment
          #       variable.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "==> Publishing $VERSION"
          # Process substitution `<( ... )` doesn't work
          # inside the runner's /bin/bash -e shell. Write
          # the changelog to a real file first, then pass
          # that file's path to publish.sh.
          CHANGELOG_FILE="$(mktemp)"
          git log -1 --pretty=%B > "$CHANGELOG_FILE"
          ./script/publish.sh "$VERSION" \
            --repo "${{ github.repository }}" \
            --changelog "$CHANGELOG_FILE" \
            --force \
            --yes \
            --skip-gpg

      - name: Update Homebrew tap
        if: steps.opt.outputs.homebrew == 'true' && steps.version.outputs.skip != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "==> Updating tap ${{ github.repository_owner }}/homebrew-cortex"
          ./script/update-tap.sh "$VERSION" \
            --tap "${{ github.repository_owner }}/homebrew-cortex" || \
            echo "!! Tap update failed; the GitHub release is still published."

      - name: Publish npm package
        if: steps.opt.outputs.npm == 'true' && steps.version.outputs.skip != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          echo "==> Publishing mateooo93-cortex to npm"
          ./script/publish-npm.sh "$VERSION" --yes

      - name: Submit winget manifest PR
        if: steps.opt.outputs.winget == 'true' && steps.version.outputs.skip != 'true'
        uses: vedantmgoyal2009/winget-releaser@main
        with:
          identifier: Mateooo93.Cortex
          release-tag: ${{ steps.version.outputs.version }}
          installers-regex: 'cortex-windows-.*\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}

      - name: Tag the release
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          echo "==> Tagging $VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # `gh release create` already creates the
          # tag on the remote as part of the publish
          # step. Re-running `git tag` would just
          # create a duplicate local tag and
          # `git push origin $VERSION` would fail
          # with "tag already exists". The safe
          # pattern: check if the remote tag exists
          # already; if so, just fetch it locally.
          # If not, create + push as the original
          # code did.
          if git ls-remote --tags origin "refs/tags/$VERSION" | grep -q "refs/tags/$VERSION"; then
            echo "    Tag $VERSION already exists on remote — skipping create/push."
            git fetch origin "refs/tags/$VERSION:refs/tags/$VERSION" || true
          else
            git tag -a "$VERSION" -m "Release $VERSION"
            git push origin "$VERSION"
          fi
